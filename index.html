    .year-detail summary { list-style:none; cursor:pointer; padding:18px 20px; display:flex; align-items:center; justify-content:space-between; gap:18px; }
    .year-detail summary::-webkit-details-marker { display:none; }
    .year-detail[open] summary { background: rgba(0,212,255,.04); border-bottom:1px solid rgba(0,212,255,.08); }
    .year-detail-title { display:flex; flex-direction:column; gap:4px; }
    .year-detail-title strong { color:#fff; font-size: 1rem; }
    .year-detail-title span { color: var(--text-muted); font-size: 0.74rem; letter-spacing: .4px; text-transform: uppercase; }
    .year-detail-meta { text-align:right; }
    .year-detail-meta strong { display:block; color: var(--accent3); font-size: 0.98rem; }
    .year-detail-meta span { color: var(--text-dim); font-size: 0.75rem; }
    .year-detail-body { padding: 20px; display:grid; gap:18px; }
    .year-mini-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap:12px; }
    .year-mini-card { background: var(--surface2); border:1px solid rgba(255,255,255,.04); border-radius:12px; padding:14px; }
    .year-mini-card .label { color: var(--text-muted); font-size:0.68rem; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .year-mini-card .value { color:#fff; font-size:1.05rem; font-weight:700; }
    .year-mini-card .sub { color: var(--text-dim); font-size:0.72rem; margin-top:4px; }
    .yearwise-flex { display:grid; grid-template-columns: 1.2fr .8fr; gap:18px; }
    .chip-row { display:flex; flex-wrap:wrap; gap:8px; }
    .metric-chip { background: rgba(124,58,237,.12); color:#c4b5fd; border:1px solid rgba(124,58,237,.2); padding:6px 10px; border-radius:999px; font-size:0.72rem; }
    .metric-chip strong { color:#fff; }
    .yoy-pos { color: var(--accent3); font-weight: 700; }
    .yoy-neg { color: var(--accent5); font-weight: 700; }
    .yoy-flat { color: var(--text-dim); font-weight: 700; }
    @media (max-width: 920px) { .yearwise-flex { grid-template-columns: 1fr; } .year-detail summary { align-items:flex-start; flex-direction:column; } .year-detail-meta { text-align:left; } }
  `;
  document.head.appendChild(injectedStyle);

  const money = n => n != null ? '₹' + Number(n).toLocaleString('en-IN') : '–';
  const compactMoney = n => n != null ? '₹' + (Number(n)/100000).toFixed(2) + 'L' : '–';
  const count = n => n != null ? Number(n).toLocaleString('en-IN') : '–';
  const esc = s => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  const yoyClass = v => v > 0 ? 'yoy-pos' : v < 0 ? 'yoy-neg' : 'yoy-flat';
  const yoyText = v => v == null ? '–' : `${v > 0 ? '+' : ''}${v.toFixed(1)}%`;

  const departmentOrder = ['LAB', 'X-Ray', 'ECG', 'TMT', 'ECHO', 'USG', 'Other'];
  const bestRevenueYear = yearWiseReports.reduce((best, item) => item.totalAmount > best.totalAmount ? item : best, yearWiseReports[0]);
  const bestPatientYear = yearWiseReports.reduce((best, item) => item.totalPatients > best.totalPatients ? item : best, yearWiseReports[0]);
  const firstYear = yearWiseReports[0];
  const lastYear = yearWiseReports[yearWiseReports.length - 1];
  const totalHistoricalAmount = yearWiseReports.reduce((sum, item) => sum + item.totalAmount, 0);
  const totalHistoricalPatients = yearWiseReports.reduce((sum, item) => sum + item.totalPatients, 0);
  const latestMix = departmentOrder.map(name => ({ name, value: lastYear.deptYTD[name] || 0 })).filter(x => x.value > 0);

  const yearwiseBtn = document.createElement('button');
  yearwiseBtn.className = 'tab-btn';
  yearwiseBtn.textContent = '📅 Year Wise Report';
  yearwiseBtn.dataset.tab = 'yearwise';
  tabNav.appendChild(yearwiseBtn);
  yearwiseBtn.addEventListener('click', () => switchTab('yearwise'));

  const summaryRows = yearWiseReports.map((item, index) => {
    const prev = index ? yearWiseReports[index - 1] : null;
    const yoy = prev && prev.totalAmount ? ((item.totalAmount - prev.totalAmount) / prev.totalAmount) * 100 : null;
    return `
      <tr>
        <td class="date-col">FY ${esc(item.year)}</td>
        <td class="patients">${count(item.totalPatients)}</td>
        <td class="money">${money(item.totalAmount)}</td>
        <td class="money">${money(item.netCollection)}</td>
        <td>${money(item.deptYTD['LAB'])}</td>
        <td>${money(item.deptYTD['X-Ray'])}</td>
        <td>${money(item.deptYTD['ECG'])}</td>
        <td>${money(item.deptYTD['TMT'])}</td>
        <td>${money(item.deptYTD['ECHO'])}</td>
        <td>${money(item.deptYTD['USG'])}</td>
        <td>${money(item.deptYTD['Other'])}</td>
        <td class="${yoyClass(yoy)}">${yoyText(yoy)}</td>
      </tr>`;
  }).join('');

  const detailBlocks = yearWiseReports.map((item, index) => {
    const prev = index ? yearWiseReports[index - 1] : null;
    const yoy = prev && prev.totalAmount ? ((item.totalAmount - prev.totalAmount) / prev.totalAmount) * 100 : null;
    const revenueRows = departmentOrder.filter(name => item.deptMonthly[name]).map(name => `
      <tr>
        <td class="date-col">${esc(name)}</td>
        ${item.deptMonthly[name].map(v => `<td>${money(v)}</td>`).join('')}
        <td class="money">${money(item.deptYTD[name] || 0)}</td>
      </tr>`).join('');
    const patientRows = departmentOrder.filter(name => item.patientMonthly[name]).map(name => `
      <tr>
        <td class="date-col">${esc(name)}</td>
        ${item.patientMonthly[name].map(v => `<td>${count(v)}</td>`).join('')}
        <td class="patients">${count(item.patientYTD[name] || 0)}</td>
      </tr>`).join('');
    const monthHeader = item.months.map(m => `<th>${esc(m)}</th>`).join('');
    const openAttr = index === yearWiseReports.length - 1 ? 'open' : '';
    return `
      <div class="year-card-block">
        <details class="year-detail" ${openAttr}>
          <summary>
            <div class="year-detail-title">
              <strong>FY ${esc(item.year)}</strong>
              <span>Complete monthly department-wise and patient-wise report</span>
            </div>
            <div class="year-detail-meta">
              <strong>${compactMoney(item.totalAmount)}</strong>
              <span>${count(item.totalPatients)} patients · <span class="${yoyClass(yoy)}">${yoyText(yoy)}</span> vs previous year</span>
            </div>
          </summary>
          <div class="year-detail-body">
            <div class="year-mini-grid">
              <div class="year-mini-card"><div class="label">Total Amount</div><div class="value">${money(item.totalAmount)}</div><div class="sub">Top-line yearly amount</div></div>
              <div class="year-mini-card"><div class="label">Net Collection</div><div class="value">${money(item.netCollection)}</div><div class="sub">Department YTD total</div></div>
              <div class="year-mini-card"><div class="label">Total Patients</div><div class="value">${count(item.totalPatients)}</div><div class="sub">Yearly patient count</div></div>
              <div class="year-mini-card"><div class="label">Top Revenue Dept</div><div class="value">${esc(departmentOrder.reduce((best, name) => ((item.deptYTD[name] || 0) > (item.deptYTD[best] || 0) ? name : best), departmentOrder[0]))}</div><div class="sub">Highest YTD contribution</div></div>
            </div>
            <div class="yearwise-flex">
              <div>
                <div class="section-header" style="margin-top:0"><div class="section-dot"></div><div class="section-title">Department Revenue Table</div><div class="section-sub">Monthly amount + YTD</div></div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr><th>Department</th>${monthHeader}<th>YTD</th></tr>
                    </thead>
                    <tbody>
                      ${revenueRows}
                      <tr class="total-row"><td>Net Collection</td>${item.months.map(() => '<td>—</td>').join('')}<td>${money(item.netCollection)}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div>
                <div class="section-header" style="margin-top:0"><div class="section-dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></div><div class="section-title">Patient Count Table</div><div class="section-sub">Service-wise yearly volume</div></div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr><th>Service</th>${monthHeader}<th>YTD</th></tr>
                    </thead>
                    <tbody>
                      ${patientRows}
                      <tr class="total-row"><td>Total Patient</td>${item.months.map(() => '<td>—</td>').join('')}<td>${count(item.totalPatients)}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            <div class="chip-row">
              ${departmentOrder.filter(name => item.deptYTD[name] != null).map(name => `<div class="metric-chip"><strong>${esc(name)}:</strong> ${money(item.deptYTD[name])}</div>`).join('')}
            </div>
          </div>
        </details>
      </div>`;
  }).join('');

  const yearwisePanel = document.createElement('div');
  yearwisePanel.className = 'tab-panel';
  yearwisePanel.id = 'panel-yearwise';
  yearwisePanel.innerHTML = `
    <div class="overview-grid">
      <div class="kpi blue"><div class="kpi-label">Years Covered</div><div class="kpi-value">${count(yearWiseReports.length)}</div><div class="kpi-sub">FY ${esc(firstYear.year)} to FY ${esc(lastYear.year)}</div></div>
      <div class="kpi purple"><div class="kpi-label">Historical Amount</div><div class="kpi-value small">${compactMoney(totalHistoricalAmount)}</div><div class="kpi-sub">Combined total across all years</div></div>
      <div class="kpi green"><div class="kpi-label">Historical Patients</div><div class="kpi-value">${count(totalHistoricalPatients)}</div><div class="kpi-sub">All available years combined</div></div>
      <div class="kpi amber"><div class="kpi-label">Best Revenue Year</div><div class="kpi-value small">FY ${esc(bestRevenueYear.year)}</div><div class="kpi-sub">${compactMoney(bestRevenueYear.totalAmount)}</div></div>
      <div class="kpi blue"><div class="kpi-label">Best Patient Year</div><div class="kpi-value small">FY ${esc(bestPatientYear.year)}</div><div class="kpi-sub">${count(bestPatientYear.totalPatients)} patients</div></div>
      <div class="kpi purple"><div class="kpi-label">Latest Year</div><div class="kpi-value small">FY ${esc(lastYear.year)}</div><div class="kpi-sub">${compactMoney(lastYear.totalAmount)} · ${count(lastYear.totalPatients)} patients</div></div>
      <div class="kpi green"><div class="kpi-label">Latest Net Collection</div><div class="kpi-value small">${compactMoney(lastYear.netCollection)}</div><div class="kpi-sub">From yearly department total</div></div>
      <div class="kpi amber"><div class="kpi-label">Latest Top Dept</div><div class="kpi-value small">${esc(latestMix.sort((a,b)=>b.value-a.value)[0]?.name || '—')}</div><div class="kpi-sub">Highest YTD contribution in FY ${esc(lastYear.year)}</div></div>
    </div>

    <div class="section-header"><div class="section-dot"></div><div class="section-title">Year-wise Trend Overview</div><div class="section-sub">Added from LAB STATICS 2014-2025.xlsx</div></div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>Total Amount by Financial Year</h3>
        <div class="chart-wrap"><canvas id="yearRevenueChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Total Patients by Financial Year</h3>
        <div class="chart-wrap"><canvas id="yearPatientsChart"></canvas></div>
      </div>
      <div class="chart-card chart-wide">
        <h3>Latest Year Department Mix (FY ${esc(lastYear.year)})</h3>
        <div class="chart-wrap tall"><canvas id="yearDeptChart"></canvas></div>
      </div>
    </div>

    <div class="section-header"><div class="section-dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></div><div class="section-title">Financial Year Summary Table</div><div class="section-sub">Revenue, collection and department YTD comparison</div></div>
    <div class="year-summary-note">This section keeps your existing dashboard unchanged and adds a separate financial-year report view using the uploaded Excel workbook.</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Financial Year</th>
            <th>Total Patients</th>
            <th>Total Amount</th>
            <th>Net Collection</th>
            <th>LAB</th>
            <th>X-Ray</th>
            <th>ECG</th>
            <th>TMT</th>
            <th>ECHO</th>
            <th>USG</th>
            <th>Other</th>
            <th>YoY</th>
          </tr>
        </thead>
        <tbody>${summaryRows}</tbody>
      </table>
    </div>

    <div class="section-header"><div class="section-dot" style="background:var(--accent3);box-shadow:0 0 8px var(--accent3)"></div><div class="section-title">Detailed Year-wise Reports</div><div class="section-sub">Open any year to view month-wise Excel data</div></div>
    <div class="yearwise-stack">${detailBlocks}</div>
  `;
  mainContent.appendChild(yearwisePanel);

  new Chart(document.getElementById('yearRevenueChart'), {
    type: 'line',
    data: {
      labels: yearWiseReports.map(y => `FY ${y.year}`),
      datasets: [{
        label: 'Total Amount',
        data: yearWiseReports.map(y => y.totalAmount),
        borderColor: COLORS.accent,
        backgroundColor: 'rgba(0,212,255,0.18)',
        fill: true,
        tension: 0.28,
        pointRadius: 4,
        pointBackgroundColor: COLORS.accent,
      }]
    },
    options: { ...baseOptions('₹ Amount') }
  });

  new Chart(document.getElementById('yearPatientsChart'), {
    type: 'bar',
    data: {
      labels: yearWiseReports.map(y => `FY ${y.year}`),
      datasets: [{
        label: 'Patients',
        data: yearWiseReports.map(y => y.totalPatients),
        backgroundColor: 'rgba(124,58,237,0.72)',
        borderColor: COLORS.accent2,
        borderWidth: 1.2,
        borderRadius: 6,
      }]
    },
    options: { ...baseOptions('Patients') }
  });

  new Chart(document.getElementById('yearDeptChart'), {
    type: 'doughnut',
    data: {
      labels: latestMix.map(x => x.name),
      datasets: [{
        data: latestMix.map(x => x.value),
        backgroundColor: [
          'rgba(0,212,255,0.78)',
          'rgba(124,58,237,0.78)',
          'rgba(16,185,129,0.78)',
          'rgba(245,158,11,0.78)',
          'rgba(239,68,68,0.78)',
          'rgba(247,201,72,0.78)',
          'rgba(148,163,184,0.78)'
        ],
        borderColor: '#111827',
        borderWidth: 2,
      }]
    },
    options: {
      ...baseOptions(''),
      cutout: '62%',
      plugins: {
        legend: { display: true, position: 'right', labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } }
      }
    }
  });
})();

</script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --gold: #f7c948;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1b2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,212,255,.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .clinic-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .clinic-sub { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .period-badge {
    background: linear-gradient(135deg, rgba(0,212,255,.12), rgba(124,58,237,.12));
    border: 1px solid rgba(0,212,255,.25);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--accent);
    letter-spacing: 1px;
    text-align: right;
  }
  .period-badge strong { display: block; font-size: 1.1rem; color: #fff; font-weight: 600; }

  /* ─── NAV TABS ─── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }
  .tab-nav::-webkit-scrollbar { height: 3px; }
  .tab-nav::-webkit-scrollbar-track { background: transparent; }
  .tab-nav::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .2s;
  }
  .tab-btn:hover { color: var(--text-dim); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── MAIN ─── */
  .main { padding: 28px 40px 60px; max-width: 1600px; margin: 0 auto; }

  /* ─── OVERVIEW STRIP ─── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .kpi:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi.blue::after  { background: linear-gradient(90deg, var(--accent), transparent); }
  .kpi.purple::after { background: linear-gradient(90deg, var(--accent2), transparent); }
  .kpi.green::after  { background: linear-gradient(90deg, var(--accent3), transparent); }
  .kpi.amber::after  { background: linear-gradient(90deg, var(--accent4), transparent); }
  .kpi.red::after    { background: linear-gradient(90deg, var(--accent5), transparent); }
  .kpi-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; }
  .kpi-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .kpi-value.small { font-size: 1.15rem; }
  .kpi-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

  /* ─── SECTION HEADER ─── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    margin-top: 36px;
  }
  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
  .section-sub { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

  /* ─── CHARTS ─── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .chart-wide { grid-column: 1 / -1; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .chart-card h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap.tall { height: 280px; }

  /* ─── TABLE ─── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .table-wrap::-webkit-scrollbar { height: 4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead { background: var(--surface2); }
  th {
    padding: 11px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  th:first-child { color: var(--accent); }
  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(30,45,69,.5);
    color: var(--text-dim);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,.03); }
  td.date-col { color: var(--text); font-weight: 500; }
  td.money { color: var(--accent3); font-weight: 600; }
  td.cumul { color: var(--gold); font-weight: 500; }
  td.patients { color: #c4b5fd; font-weight: 600; }
  td.highlight { background: rgba(0,212,255,.05); }
  .total-row td { background: rgba(124,58,237,.08) !important; color: #fff !important; font-weight: 700; border-top: 2px solid var(--accent2); font-size: 0.82rem; }
  .holiday-row td { color: var(--text-muted) !important; font-style: italic; background: rgba(239,68,68,.04) !important; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-paytm { background: rgba(0,212,255,.15); color: var(--accent); }
  .badge-card   { background: rgba(124,58,237,.15); color: #a78bfa; }
  .badge-cash   { background: rgba(16,185,129,.15); color: var(--accent3); }

  /* ─── NOTES COLUMN ─── */
  .notes-text { max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: 0.72rem; color: var(--text-muted); }

  /* ─── TAB PANELS ─── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── SUMMARY COMPARISON ─── */
  .month-comparison {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .month-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .month-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .month-card.selected { border-color: var(--accent); background: rgba(0,212,255,.05); }
  .month-card-name { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 6px; }
  .month-card-collection { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .month-card-patients { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  .month-card-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin-top: 10px;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .header { padding: 20px; }
    .clinic-name { font-size: 1.5rem; }
    .main { padding: 16px 16px 40px; }
    .tab-nav { padding: 0 16px; }
    .charts-row { grid-template-columns: 1fr; }
    .chart-wide { grid-column: 1; }
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .tab-panel.active { animation: fadeIn .25s ease; }

  /* ─── PAYMENT METHOD LEGEND ─── */
  .pay-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
  .pay-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); }
  .pay-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${id}`));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

  const bestPatientYear = yearWiseReports.reduce((best, item) => item.totalPatients > best.totalPatients ? item : best, yearWiseReports[0]);
  const firstYear = yearWiseReports[0];
  const lastYear = yearWiseReports[yearWiseReports.length - 1];
  const totalHistoricalAmount = yearWiseReports.reduce((sum, item) => sum + item.totalAmount, 0);
  const totalHistoricalPatients = yearWiseReports.reduce((sum, item) => sum + item.totalPatients, 0);
  const latestMix = departmentOrder.map(name => ({ name, value: lastYear.deptYTD[name] || 0 })).filter(x => x.value > 0);

  const yearwiseBtn = document.createElement('button');
  yearwiseBtn.className = 'tab-btn';
  yearwiseBtn.textContent = '📅 Year Wise Report';
  yearwiseBtn.dataset.tab = 'yearwise';
  tabNav.appendChild(yearwiseBtn);
  yearwiseBtn.addEventListener('click', () => switchTab('yearwise'));

  const summaryRows = yearWiseReports.map((item, index) => {
    const prev = index ? yearWiseReports[index - 1] : null;
    const yoy = prev && prev.totalAmount ? ((item.totalAmount - prev.totalAmount) / prev.totalAmount) * 100 : null;
    return `
      <tr>
        <td class="date-col">FY ${esc(item.year)}</td>
        <td class="patients">${count(item.totalPatients)}</td>
        <td class="money">${money(item.totalAmount)}</td>
        <td class="money">${money(item.netCollection)}</td>
        <td>${money(item.deptYTD['LAB'])}</td>
        <td>${money(item.deptYTD['X-Ray'])}</td>
        <td>${money(item.deptYTD['ECG'])}</td>
        <td>${money(item.deptYTD['TMT'])}</td>
        <td>${money(item.deptYTD['ECHO'])}</td>
        <td>${money(item.deptYTD['USG'])}</td>
        <td>${money(item.deptYTD['Other'])}</td>
        <td class="${yoyClass(yoy)}">${yoyText(yoy)}</td>
      </tr>`;
  }).join('');

  const detailBlocks = yearWiseReports.map((item, index) => {
    const prev = index ? yearWiseReports[index - 1] : null;
    const yoy = prev && prev.totalAmount ? ((item.totalAmount - prev.totalAmount) / prev.totalAmount) * 100 : null;
    const revenueRows = departmentOrder.filter(name => item.deptMonthly[name]).map(name => `
      <tr>
        <td class="date-col">${esc(name)}</td>
        ${item.deptMonthly[name].map(v => `<td>${money(v)}</td>`).join('')}
        <td class="money">${money(item.deptYTD[name] || 0)}</td>
      </tr>`).join('');
    const patientRows = departmentOrder.filter(name => item.patientMonthly[name]).map(name => `
      <tr>
        <td class="date-col">${esc(name)}</td>
        ${item.patientMonthly[name].map(v => `<td>${count(v)}</td>`).join('')}
        <td class="patients">${count(item.patientYTD[name] || 0)}</td>
      </tr>`).join('');
    const monthHeader = item.months.map(m => `<th>${esc(m)}</th>`).join('');
    const openAttr = index === yearWiseReports.length - 1 ? 'open' : '';
    return `
      <div class="year-card-block">
        <details class="year-detail" ${openAttr}>
          <summary>
            <div class="year-detail-title">
              <strong>FY ${esc(item.year)}</strong>
              <span>Complete monthly department-wise and patient-wise report</span>
            </div>
            <div class="year-detail-meta">
              <strong>${compactMoney(item.totalAmount)}</strong>
              <span>${count(item.totalPatients)} patients · <span class="${yoyClass(yoy)}">${yoyText(yoy)}</span> vs previous year</span>
            </div>
          </summary>
          <div class="year-detail-body">
            <div class="year-mini-grid">
              <div class="year-mini-card"><div class="label">Total Amount</div><div class="value">${money(item.totalAmount)}</div><div class="sub">Top-line yearly amount</div></div>
              <div class="year-mini-card"><div class="label">Net Collection</div><div class="value">${money(item.netCollection)}</div><div class="sub">Department YTD total</div></div>
              <div class="year-mini-card"><div class="label">Total Patients</div><div class="value">${count(item.totalPatients)}</div><div class="sub">Yearly patient count</div></div>
              <div class="year-mini-card"><div class="label">Top Revenue Dept</div><div class="value">${esc(departmentOrder.reduce((best, name) => ((item.deptYTD[name] || 0) > (item.deptYTD[best] || 0) ? name : best), departmentOrder[0]))}</div><div class="sub">Highest YTD contribution</div></div>
            </div>
            <div class="yearwise-flex">
              <div>
                <div class="section-header" style="margin-top:0"><div class="section-dot"></div><div class="section-title">Department Revenue Table</div><div class="section-sub">Monthly amount + YTD</div></div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr><th>Department</th>${monthHeader}<th>YTD</th></tr>
                    </thead>
                    <tbody>
                      ${revenueRows}
                      <tr class="total-row"><td>Net Collection</td>${item.months.map(() => '<td>—</td>').join('')}<td>${money(item.netCollection)}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div>
                <div class="section-header" style="margin-top:0"><div class="section-dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></div><div class="section-title">Patient Count Table</div><div class="section-sub">Service-wise yearly volume</div></div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr><th>Service</th>${monthHeader}<th>YTD</th></tr>
                    </thead>
                    <tbody>
                      ${patientRows}
                      <tr class="total-row"><td>Total Patient</td>${item.months.map(() => '<td>—</td>').join('')}<td>${count(item.totalPatients)}</td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
            <div class="chip-row">
              ${departmentOrder.filter(name => item.deptYTD[name] != null).map(name => `<div class="metric-chip"><strong>${esc(name)}:</strong> ${money(item.deptYTD[name])}</div>`).join('')}
            </div>
          </div>
        </details>
      </div>`;
  }).join('');

  const yearwisePanel = document.createElement('div');
  yearwisePanel.className = 'tab-panel';
  yearwisePanel.id = 'panel-yearwise';
  yearwisePanel.innerHTML = `
    <div class="overview-grid">
      <div class="kpi blue"><div class="kpi-label">Years Covered</div><div class="kpi-value">${count(yearWiseReports.length)}</div><div class="kpi-sub">FY ${esc(firstYear.year)} to FY ${esc(lastYear.year)}</div></div>
      <div class="kpi purple"><div class="kpi-label">Historical Amount</div><div class="kpi-value small">${compactMoney(totalHistoricalAmount)}</div><div class="kpi-sub">Combined total across all years</div></div>
      <div class="kpi green"><div class="kpi-label">Historical Patients</div><div class="kpi-value">${count(totalHistoricalPatients)}</div><div class="kpi-sub">All available years combined</div></div>
      <div class="kpi amber"><div class="kpi-label">Best Revenue Year</div><div class="kpi-value small">FY ${esc(bestRevenueYear.year)}</div><div class="kpi-sub">${compactMoney(bestRevenueYear.totalAmount)}</div></div>
      <div class="kpi blue"><div class="kpi-label">Best Patient Year</div><div class="kpi-value small">FY ${esc(bestPatientYear.year)}</div><div class="kpi-sub">${count(bestPatientYear.totalPatients)} patients</div></div>
      <div class="kpi purple"><div class="kpi-label">Latest Year</div><div class="kpi-value small">FY ${esc(lastYear.year)}</div><div class="kpi-sub">${compactMoney(lastYear.totalAmount)} · ${count(lastYear.totalPatients)} patients</div></div>
      <div class="kpi green"><div class="kpi-label">Latest Net Collection</div><div class="kpi-value small">${compactMoney(lastYear.netCollection)}</div><div class="kpi-sub">From yearly department total</div></div>
      <div class="kpi amber"><div class="kpi-label">Latest Top Dept</div><div class="kpi-value small">${esc(latestMix.sort((a,b)=>b.value-a.value)[0]?.name || '—')}</div><div class="kpi-sub">Highest YTD contribution in FY ${esc(lastYear.year)}</div></div>
    </div>

    <div class="section-header"><div class="section-dot"></div><div class="section-title">Year-wise Trend Overview</div><div class="section-sub">Added from LAB STATICS 2014-2025.xlsx</div></div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>Total Amount by Financial Year</h3>
        <div class="chart-wrap"><canvas id="yearRevenueChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Total Patients by Financial Year</h3>
        <div class="chart-wrap"><canvas id="yearPatientsChart"></canvas></div>
      </div>
      <div class="chart-card chart-wide">
        <h3>Latest Year Department Mix (FY ${esc(lastYear.year)})</h3>
        <div class="chart-wrap tall"><canvas id="yearDeptChart"></canvas></div>
      </div>
    </div>

    <div class="section-header"><div class="section-dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></div><div class="section-title">Financial Year Summary Table</div><div class="section-sub">Revenue, collection and department YTD comparison</div></div>
    <div class="year-summary-note">This section keeps your existing dashboard unchanged and adds a separate financial-year report view using the uploaded Excel workbook.</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Financial Year</th>
            <th>Total Patients</th>
            <th>Total Amount</th>
            <th>Net Collection</th>
            <th>LAB</th>
            <th>X-Ray</th>
            <th>ECG</th>
            <th>TMT</th>
            <th>ECHO</th>
            <th>USG</th>
            <th>Other</th>
            <th>YoY</th>
          </tr>
        </thead>
        <tbody>${summaryRows}</tbody>
      </table>
    </div>

    <div class="section-header"><div class="section-dot" style="background:var(--accent3);box-shadow:0 0 8px var(--accent3)"></div><div class="section-title">Detailed Year-wise Reports</div><div class="section-sub">Open any year to view month-wise Excel data</div></div>
    <div class="yearwise-stack">${detailBlocks}</div>
  `;
  mainContent.appendChild(yearwisePanel);

  new Chart(document.getElementById('yearRevenueChart'), {
    type: 'line',
    data: {
      labels: yearWiseReports.map(y => `FY ${y.year}`),
      datasets: [{
        label: 'Total Amount',
        data: yearWiseReports.map(y => y.totalAmount),
        borderColor: COLORS.accent,
        backgroundColor: 'rgba(0,212,255,0.18)',
        fill: true,
        tension: 0.28,
        pointRadius: 4,
        pointBackgroundColor: COLORS.accent,
      }]
    },
    options: { ...baseOptions('₹ Amount') }
  });

  new Chart(document.getElementById('yearPatientsChart'), {
    type: 'bar',
    data: {
      labels: yearWiseReports.map(y => `FY ${y.year}`),
      datasets: [{
        label: 'Patients',
        data: yearWiseReports.map(y => y.totalPatients),
        backgroundColor: 'rgba(124,58,237,0.72)',
        borderColor: COLORS.accent2,
        borderWidth: 1.2,
        borderRadius: 6,
      }]
    },
    options: { ...baseOptions('Patients') }
  });

  new Chart(document.getElementById('yearDeptChart'), {
    type: 'doughnut',
    data: {
      labels: latestMix.map(x => x.name),
      datasets: [{
        data: latestMix.map(x => x.value),
        backgroundColor: [
          'rgba(0,212,255,0.78)',
          'rgba(124,58,237,0.78)',
          'rgba(16,185,129,0.78)',
          'rgba(245,158,11,0.78)',
          'rgba(239,68,68,0.78)',
          'rgba(247,201,72,0.78)',
          'rgba(148,163,184,0.78)'
        ],
        borderColor: '#111827',
        borderWidth: 2,
      }]
    },
    options: {
      ...baseOptions(''),
      cutout: '62%',
      plugins: {
        legend: { display: true, position: 'right', labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } }
      }
    }
  });
})();

</script>
</body>
</html>
