<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapaasana Diagnostics Statistics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --gold: #f7c948;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  .header {
    background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1b2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 24px;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,212,255,.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .clinic-name {
    font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1;
  }
  .clinic-sub { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .period-badge {
    background: linear-gradient(135deg, rgba(0,212,255,.12), rgba(124,58,237,.12));
    border: 1px solid rgba(0,212,255,.25); border-radius: 12px;
    padding: 10px 20px; font-size: 0.82rem; color: var(--accent); letter-spacing: 1px; text-align: right;
  }
  .period-badge strong { display: block; font-size: 1.1rem; color: #fff; font-weight: 600; }

  .tab-nav {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 40px; display: flex; gap: 2px; overflow-x: auto;
  }
  .tab-nav::-webkit-scrollbar { height: 3px; }
  .tab-nav::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
  .tab-group-label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); padding: 0 8px; display: flex; align-items: flex-end; padding-bottom: 4px;
    border-right: 1px solid var(--border); margin-right: 4px; white-space: nowrap;
  }
  .tab-btn {
    background: none; border: none; color: var(--text-muted);
    padding: 14px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.5px;
    border-bottom: 2px solid transparent; white-space: nowrap; transition: all .2s;
  }
  .tab-btn:hover { color: var(--text-dim); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn.hist-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .main { padding: 28px 40px 60px; max-width: 1600px; margin: 0 auto; }

  .overview-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; position: relative; overflow: hidden; transition: transform .2s, border-color .2s;
  }
  .kpi:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
  .kpi.blue::after  { background: linear-gradient(90deg, var(--accent), transparent); }
  .kpi.purple::after { background: linear-gradient(90deg, var(--accent2), transparent); }
  .kpi.green::after  { background: linear-gradient(90deg, var(--accent3), transparent); }
  .kpi.amber::after  { background: linear-gradient(90deg, var(--accent4), transparent); }
  .kpi.gold::after   { background: linear-gradient(90deg, var(--gold), transparent); }
  .kpi-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; }
  .kpi-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .kpi-value.small { font-size: 1.15rem; }
  .kpi-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; margin-top: 36px; }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
  .section-sub { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-wide { grid-column: 1 / -1; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .chart-card h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap.tall { height: 300px; }
  .chart-wrap.xtall { height: 380px; }

  .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); }
  .table-wrap::-webkit-scrollbar { height: 4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead { background: var(--surface2); }
  th {
    padding: 11px 14px; text-align: left; font-weight: 600; font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
    white-space: nowrap; border-bottom: 1px solid var(--border);
  }
  th:first-child { color: var(--accent); }
  td { padding: 9px 14px; border-bottom: 1px solid rgba(30,45,69,.5); color: var(--text-dim); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,.03); }
  td.date-col { color: var(--text); font-weight: 500; }
  td.money { color: var(--accent3); font-weight: 600; }
  td.cumul { color: var(--gold); font-weight: 500; }
  td.patients { color: #c4b5fd; font-weight: 600; }
  .total-row td { background: rgba(124,58,237,.08) !important; color: #fff !important; font-weight: 700; border-top: 2px solid var(--accent2); font-size: 0.82rem; }
  .holiday-row td { color: var(--text-muted) !important; font-style: italic; background: rgba(239,68,68,.04) !important; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px; }
  .badge-paytm { background: rgba(0,212,255,.15); color: var(--accent); }
  .badge-card   { background: rgba(124,58,237,.15); color: #a78bfa; }
  .badge-cash   { background: rgba(16,185,129,.15); color: var(--accent3); }
  .notes-text { max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: 0.72rem; color: var(--text-muted); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .month-comparison { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .month-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .month-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .month-card-name { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 6px; }
  .month-card-collection { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .month-card-patients { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  .month-card-bar { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; margin-top: 10px; }

  /* Historical year cards */
  .year-cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .year-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .year-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); }
  .year-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .year-card.selected { border-color: var(--gold); background: rgba(247,201,72,.04); }
  .year-card-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; }
  .year-card-amount { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
  .year-card-patients { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
  .year-card-bar { height: 3px; background: linear-gradient(90deg, var(--gold), rgba(247,201,72,.2)); border-radius: 2px; margin-top: 12px; }

  /* Comparison selector */
  .compare-controls {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  }
  .compare-controls label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .compare-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer;
  }
  .compare-select:focus { outline: none; border-color: var(--gold); }
  .compare-btn {
    background: linear-gradient(135deg, rgba(247,201,72,.2), rgba(247,201,72,.1));
    border: 1px solid rgba(247,201,72,.4); color: var(--gold); padding: 8px 20px;
    border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; font-weight: 600; transition: all .2s;
  }
  .compare-btn:hover { background: rgba(247,201,72,.2); }

  /* Highlight row for best year */
  .best-row td { color: var(--gold) !important; font-weight: 700; }
  .worst-row td { color: rgba(239,68,68,.7) !important; }

  /* Growth badge */
  .growth-pos { color: var(--accent3); font-weight: 600; font-size: 0.75rem; }
  .growth-neg { color: var(--accent5); font-weight: 600; font-size: 0.75rem; }

  @media (max-width: 768px) {
    .header { padding: 20px; }
    .clinic-name { font-size: 1.5rem; }
    .main { padding: 16px 16px 40px; }
    .tab-nav { padding: 0 16px; }
    .charts-row { grid-template-columns: 1fr; }
    .chart-wide { grid-column: 1; }
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .tab-panel.active { animation: fadeIn .25s ease; }
</style>
</head>

  // Per-year charts
  historicalYears.forEach(y=>{
    const ncData=y.net_collection;
    const nonZeroMons=y.months.filter((_,i)=>ncData[i]>0);
    const nonZeroNC=ncData.filter(v=>v>0);
    const maxNC=nonZeroNC.length?Math.max(...nonZeroNC):0;

    const hbar=document.getElementById(`hbar-${y.id}`);
    if(hbar) new Chart(hbar,{
      type:'bar',
      data:{labels:y.months,datasets:[{label:'Net Collection',data:ncData.map(v=>v||null),backgroundColor:ncData.map(v=>v===maxNC?COLORS.gold:v>0?'rgba(247,201,72,0.45)':'transparent'),borderColor:ncData.map(v=>v===maxNC?COLORS.gold:v>0?'rgba(247,201,72,0.8)':'transparent'),borderWidth:1.5,borderRadius:6}]},
      options:{...baseOptions('₹'),plugins:{...baseOptions().plugins,tooltip:{...baseOptions().plugins.tooltip,callbacks:{label:ctx=>ctx.raw?'₹'+ctx.raw.toLocaleString('en-IN'):'No data'}}}}
    });

    const hsvc=document.getElementById(`hsvc-${y.id}`);
    if(hsvc) new Chart(hsvc,{
      type:'bar',
      data:{labels:y.months,datasets:[
        {label:'USG',data:y.usg,backgroundColor:'rgba(16,185,129,0.7)',borderRadius:3},
        {label:'ECG',data:y.ecg,backgroundColor:'rgba(245,158,11,0.7)',borderRadius:3},
        {label:'ECHO',data:y.echo,backgroundColor:'rgba(124,58,237,0.7)',borderRadius:3},
        {label:'TMT',data:y.tmt,backgroundColor:'rgba(239,68,68,0.6)',borderRadius:3},
      ]},
      options:{...baseOptions('Count'),plugins:{legend:{display:true,position:'top',labels:{color:textColor,font:{size:9},boxWidth:8}}}}
    });

    const hlab=document.getElementById(`hlab-${y.id}`);
    if(hlab) new Chart(hlab,{
      type:'line',
      data:{labels:y.months,datasets:[{label:'Lab Tests',data:y.lab,borderColor:COLORS.accent,backgroundColor:'rgba(0,212,255,0.1)',borderWidth:2,tension:0.4,fill:true,pointBackgroundColor:COLORS.accent,pointRadius:4}]},
      options:baseOptions('Tests')
    });
  });
},200);
</script>
</body>
</html>
