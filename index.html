<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --gold: #f7c948;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1b2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,212,255,.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .clinic-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .clinic-sub { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .period-badge {
    background: linear-gradient(135deg, rgba(0,212,255,.12), rgba(124,58,237,.12));
    border: 1px solid rgba(0,212,255,.25);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--accent);
    letter-spacing: 1px;
    text-align: right;
  }
  .period-badge strong { display: block; font-size: 1.1rem; color: #fff; font-weight: 600; }

  /* ─── NAV TABS ─── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }
  .tab-nav::-webkit-scrollbar { height: 3px; }
  .tab-nav::-webkit-scrollbar-track { background: transparent; }
  .tab-nav::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .2s;
  }
  .tab-btn:hover { color: var(--text-dim); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── MAIN ─── */
  .main { padding: 28px 40px 60px; max-width: 1600px; margin: 0 auto; }

  /* ─── OVERVIEW STRIP ─── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .kpi:hover { transform: translateY(-2px); border-color: var(--accent); }
  .kpi::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi.blue::after  { background: linear-gradient(90deg, var(--accent), transparent); }
  .kpi.purple::after { background: linear-gradient(90deg, var(--accent2), transparent); }
  .kpi.green::after  { background: linear-gradient(90deg, var(--accent3), transparent); }
  .kpi.amber::after  { background: linear-gradient(90deg, var(--accent4), transparent); }
  .kpi.red::after    { background: linear-gradient(90deg, var(--accent5), transparent); }
  .kpi-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; }
  .kpi-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .kpi-value.small { font-size: 1.15rem; }
  .kpi-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

  /* ─── SECTION HEADER ─── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    margin-top: 36px;
  }
  .section-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: #fff; }
  .section-sub { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

  /* ─── CHARTS ─── */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .chart-wide { grid-column: 1 / -1; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .chart-card h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-wrap.tall { height: 280px; }

  /* ─── TABLE ─── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .table-wrap::-webkit-scrollbar { height: 4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead { background: var(--surface2); }
  th {
    padding: 11px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  th:first-child { color: var(--accent); }
  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(30,45,69,.5);
    color: var(--text-dim);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,212,255,.03); }
  td.date-col { color: var(--text); font-weight: 500; }
  td.money { color: var(--accent3); font-weight: 600; }
  td.cumul { color: var(--gold); font-weight: 500; }
  td.patients { color: #c4b5fd; font-weight: 600; }
  td.highlight { background: rgba(0,212,255,.05); }
  .total-row td { background: rgba(124,58,237,.08) !important; color: #fff !important; font-weight: 700; border-top: 2px solid var(--accent2); font-size: 0.82rem; }
  .holiday-row td { color: var(--text-muted) !important; font-style: italic; background: rgba(239,68,68,.04) !important; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-paytm { background: rgba(0,212,255,.15); color: var(--accent); }
  .badge-card   { background: rgba(124,58,237,.15); color: #a78bfa; }
  .badge-cash   { background: rgba(16,185,129,.15); color: var(--accent3); }

  /* ─── NOTES COLUMN ─── */
  .notes-text { max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: 0.72rem; color: var(--text-muted); }

  /* ─── TAB PANELS ─── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── SUMMARY COMPARISON ─── */
  .month-comparison {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .month-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .month-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .month-card.selected { border-color: var(--accent); background: rgba(0,212,255,.05); }
  .month-card-name { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 6px; }
  .month-card-revenue { font-size: 1.4rem; font-weight: 700; color: #fff; }
  .month-card-patients { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  .month-card-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin-top: 10px;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .header { padding: 20px; }
    .clinic-name { font-size: 1.5rem; }
    .main { padding: 16px 16px 40px; }
    .tab-nav { padding: 0 16px; }
    .charts-row { grid-template-columns: 1fr; }
    .chart-wide { grid-column: 1; }
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .tab-panel.active { animation: fadeIn .25s ease; }

  /* ─── PAYMENT METHOD LEGEND ─── */
  .pay-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
  .pay-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); }
  .pay-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>

            <td>${fmtN(m.patients)}</td>
            <td>${fmtN(m.lab)}</td>
            <td>${fmtN(m.xray)}</td>
            <td>${fmtN(m.scan)}</td>
            <td>${fmtN(m.ecg)}</td>
            <td>${fmtN(m.echo)}</td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
  mainContent.appendChild(panel);
});

// ─────────────────────────────────────────────────────────
// CHARTS
// ─────────────────────────────────────────────────────────
const COLORS = {
  accent: '#00d4ff', accent2: '#7c3aed', accent3: '#10b981',
  accent4: '#f59e0b', accent5: '#ef4444', gold: '#f7c948'
};
const gridColor = 'rgba(30,45,69,0.6)';
const textColor = '#64748b';

function baseOptions(yLabel = '') {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a2236',
        borderColor: '#1e2d45',
        borderWidth: 1,
        titleColor: '#e2e8f0',
        bodyColor: '#94a3b8',
        padding: 10,
      }
    },
    scales: {
      x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
      y: {
        grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } },
        title: { display: !!yLabel, text: yLabel, color: textColor, font: { size: 10 } }
      }
    }
  };
}

// Overview: Revenue trend
new Chart(document.getElementById('revTrendChart'), {
  type: 'bar',
  data: {
    labels: months.map(m => m.shortName),
    datasets: [{
      label: 'Revenue',
      data: months.map(m => m.total),
      backgroundColor: months.map(m => m.id === bestMonth.id ? COLORS.gold : 'rgba(0,212,255,0.55)'),
      borderColor: months.map(m => m.id === bestMonth.id ? COLORS.gold : COLORS.accent),
      borderWidth: 1.5,
      borderRadius: 6,
    }]
  },
  options: {
    ...baseOptions('₹ Collection'),
    plugins: {
      ...baseOptions().plugins,
      legend: { display: false },
      tooltip: {
        ...baseOptions().plugins.tooltip,
        callbacks: { label: ctx => '₹' + ctx.raw.toLocaleString('en-IN') }
      }
    }
  }
});

// Overview: Patients
new Chart(document.getElementById('patientChart'), {
  type: 'line',
  data: {
    labels: months.map(m => m.shortName),
    datasets: [{
      label: 'Total Patients',
      data: months.map(m => m.patients),
      borderColor: COLORS.accent2,
      backgroundColor: 'rgba(124,58,237,0.15)',
      borderWidth: 2,
      tension: 0.4,
      fill: true,
      pointBackgroundColor: COLORS.accent2,
      pointRadius: 4,
    }]
  },
  options: baseOptions('Patients')
});

// Overview: Payment pie
const totalPaytm = months.reduce((s,m) => s + m.paytm, 0);
const totalCard = months.reduce((s,m) => s + m.card, 0);
const totalCash = months.reduce((s,m) => s + m.cash, 0);
new Chart(document.getElementById('paymentPieChart'), {
  type: 'doughnut',
  data: {
    labels: ['Paytm/UPI', 'Card', 'Cash'],
    datasets: [{
      data: [totalPaytm, totalCard, totalCash],
      backgroundColor: [COLORS.accent, COLORS.accent2, COLORS.accent3],
      borderWidth: 0,
      hoverOffset: 8,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        display: true,
        position: 'bottom',
        labels: { color: textColor, font: { size: 10 }, padding: 14 }
      },
      tooltip: {
        callbacks: { label: ctx => ctx.label + ': ₹' + ctx.raw.toLocaleString('en-IN') }
      }
    }
  }
});

// Overview: Service breakdown
new Chart(document.getElementById('serviceChart'), {
  type: 'bar',
  data: {
    labels: months.map(m => m.shortName),
    datasets: [
      { label: 'Lab', data: months.map(m => m.lab), backgroundColor: 'rgba(0,212,255,0.7)', borderRadius: 4 },
      { label: 'X-Ray', data: months.map(m => m.xray), backgroundColor: 'rgba(124,58,237,0.7)', borderRadius: 4 },
      { label: 'Scan', data: months.map(m => m.scan), backgroundColor: 'rgba(16,185,129,0.7)', borderRadius: 4 },
      { label: 'ECG', data: months.map(m => m.ecg), backgroundColor: 'rgba(245,158,11,0.7)', borderRadius: 4 },
      { label: 'Echo', data: months.map(m => m.echo), backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 4 },
    ]
  },
  options: {
    ...baseOptions('Patients'),
    plugins: {
      legend: {
        display: true, position: 'top',
        labels: { color: textColor, font: { size: 10 }, boxWidth: 10 }
      }
    }
  }
});

// Per-month charts
months.forEach(m => {
  const workDays = m.days.filter(d => !d.isHoliday && d.col != null);

  // Daily bar
  new Chart(document.getElementById(`daily-${m.id}`), {
    type: 'bar',
    data: {
      labels: workDays.map(d => d.date.replace(' '+m.shortName,'')),
      datasets: [{
        label: 'Daily Collection',
        data: workDays.map(d => d.col),
        backgroundColor: workDays.map(d => {
          const max = Math.max(...workDays.map(x => x.col));
          return d.col === max ? COLORS.gold : 'rgba(0,212,255,0.5)';
        }),
        borderRadius: 3,
      }]
    },
    options: {
      ...baseOptions('₹'),
      plugins: {
        ...baseOptions().plugins,
        tooltip: {
          ...baseOptions().plugins.tooltip,
          callbacks: { label: ctx => '₹' + ctx.raw.toLocaleString('en-IN') }
        }
      }
    }
  });

  // Pie
  new Chart(document.getElementById(`pie-${m.id}`), {
    type: 'doughnut',
    data: {
      labels: ['Paytm/UPI', 'Card', 'Cash'],
      datasets: [{
        data: [m.paytm, m.card, m.cash],
        backgroundColor: [COLORS.accent, COLORS.accent2, COLORS.accent3],
        borderWidth: 0,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true, position: 'bottom',
          labels: { color: textColor, font: { size: 10 }, padding: 12 }
        },
        tooltip: {
          callbacks: { label: ctx => ctx.label + ': ₹' + ctx.raw.toLocaleString('en-IN') }
        }
      }
    }
  });
});

// ─────────────────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${id}`));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
</script>
</body>
</html>
